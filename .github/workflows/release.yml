name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained EXE
        run: |
          dotnet publish src/JobTracker.WPF/JobTracker.WPF.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output publish/win-x64 `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=embedded

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/win-x64/JobTracker.exe
          body: |
            ## JobTracker ${{ github.ref_name }}

            A self-contained Windows desktop app for tracking job applications — Kanban board, Obsidian vault sync, and PDF extraction. All data is stored locally, no account required.

            ### Install
            1. Download `JobTracker.exe` below
            2. Run it — no installer needed. Data is created at `%APPDATA%\JobTracker` on first launch
            3. Optional: set your Obsidian vault path in **Settings** (`Ctrl+O`)

            > **Windows SmartScreen:** click _More info → Run anyway_ on first run. The binary is unsigned during beta.

            ### Requirements
            - Windows 10 / 11 (x64)
            - No .NET runtime required — fully self-contained
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
